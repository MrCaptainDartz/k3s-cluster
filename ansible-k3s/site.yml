---
- name: Deploy K3s HA Cluster with kube-vip and MetalLB
  hosts: k3s_cluster
  gather_facts: true
  pre_tasks:
    # Force IPv4 preference on the nodes BEFORE the k3s role runs its downloads.
    # The nodes receive IPv6 default routes (RA) + a global IPv6 address, but IPv6 egress is
    # blackholed on this network. curl/ruby use Happy Eyeballs (race v4/v6 -> v4 wins, fast), but
    # Python's urllib (ansible get_url / uri) prefers IPv6 -> it hangs ~40s on the dead v6 path
    # before falling back to v4. That stalled the role's "download auto-deploying manifests" task
    # (get_url loop with NO timeout) for minutes on every run, and slowed the k3s binary download
    # on every node. /etc/gai.conf precedence ::ffff:0:0/96 100 makes glibc getaddrinfo return
    # IPv4 first, so every urllib-based download skips the dead v6 path. Verified: get_url 43s -> 2.5s.
    - name: Prefer IPv4 in glibc resolver (node IPv6 egress is blackholed)
      ansible.builtin.copy:
        dest: /etc/gai.conf
        content: |
          # Managed by ansible-k3s site.yml. Python urllib (Ansible get_url/uri, k3s downloads)
          # prefers IPv6 by default; this network's IPv6 egress is blackholed, so prefer IPv4.
          precedence ::ffff:0:0/96 100
        mode: "0644"
        owner: root
        group: root
      become: true
    # Auto-detect kube-vip interface based on node_cidr unless explicitly set in all.yml.
    - name: Auto-resolve the kube-vip interface from the VIP subnet
      ansible.builtin.set_fact:
        k3s_vip_interface: "{{ item.device }}"
      loop: >-
        {{
          ansible_facts.interfaces
          | map('extract', ansible_facts)
          | selectattr('ipv4', 'defined')
          | selectattr('ipv4.network', 'defined')
          | list
        }}
      when:
        - k3s_vip_interface | length == 0
          # Compare network prefixes to avoid ipaddr filter (requires netaddr lib)
        - item.ipv4.network == (node_cidr | split('/') | first)

    - name: Fail if the kube-vip interface could not be resolved
      ansible.builtin.fail:
        msg: >-
          Could not find a node interface whose subnet contains the kube-vip
          network (node_cidr={{ node_cidr }}, k3s_vip={{ k3s_vip }}). Set
          k3s_vip_interface explicitly in inventory/group_vars/all.yml.
      when: k3s_vip_interface | length == 0

    # Dynamically build K3s manifest lists (inline Jinja logic fails in YAML vars lists).
    # Ceph + CSI external-snapshotter are always appended; others are gated by *_enabled flags.
    - name: Append Ceph CSI + external-snapshotter manifests (always-on, groups 50-59)
      ansible.builtin.set_fact:
        k3s_server_manifests_urls: >-
          {{
            k3s_server_manifests_urls
            + ceph_manifest_urls
            + csi_snapshotter_manifest_urls
          }}
        k3s_server_manifests_templates: >-
          {{
            k3s_server_manifests_templates
            + ceph_manifest_templates
          }}

    - name: Append optional NFS/SMB CSI driver manifests when enabled
      ansible.builtin.set_fact:
        k3s_server_manifests_urls: >-
          {{
            k3s_server_manifests_urls
            + (nfs_enabled | bool | ternary(nfs_manifest_urls, []))
            + (smb_enabled | bool | ternary(smb_manifest_urls, []))
          }}
        k3s_server_manifests_templates: >-
          {{
            k3s_server_manifests_templates
            + (nfs_enabled | bool | ternary(nfs_manifest_templates, []))
            + (smb_enabled | bool | ternary(smb_manifest_templates, []))
          }}

    # Append cert-manager and specific DNS webhooks if enabled and configured.
    - name: Append optional cert-manager manifests when enabled
      ansible.builtin.set_fact:
        k3s_server_manifests_urls: >-
          {{
            k3s_server_manifests_urls
            + (certmanager_enabled | bool | ternary(certmanager_manifest_urls, []))
            + (((certmanager_enabled | bool) and
                (certmanager_dns_credentials | default([]) | selectattr('provider', 'equalto', 'infomaniak') | list | length > 0))
               | ternary(certmanager_webhook_infomaniak_urls, []))
          }}
        k3s_server_manifests_templates: >-
          {{
            k3s_server_manifests_templates
            + (certmanager_enabled | bool | ternary(certmanager_manifest_templates, []))
            + (((certmanager_enabled | bool) and
                (certmanager_dns_credentials | default([]) | selectattr('provider', 'equalto', 'ovh') | list | length > 0))
               | ternary(certmanager_webhook_ovh_templates, []))
          }}

    # Observability (kube-prometheus-stack + Loki + Alloy + node-exporter): opt-in, all HelmChart CRs (60-65).
    - name: Append optional observability manifests when enabled
      ansible.builtin.set_fact:
        k3s_server_manifests_urls: >-
          {{
            k3s_server_manifests_urls
            + (observability_enabled | bool | ternary(observability_manifest_urls, []))
          }}
        k3s_server_manifests_templates: >-
          {{
            k3s_server_manifests_templates
            + (observability_enabled | bool | ternary(observability_manifest_templates, []))
          }}

    # Per-application PVC snapshot CronJobs (66-): opt-in, only when volume_snapshots is non-empty.
    - name: Append optional volume snapshot CronJobs when volume_snapshots is non-empty
      ansible.builtin.set_fact:
        k3s_server_manifests_templates: >-
          {{
            k3s_server_manifests_templates
            + (((volume_snapshots | default([])) | length > 0) | ternary(volume_snapshots_manifest_templates, []))
          }}

    # Persistent journald: K3s control-plane components log to the host's journald unit (k3s.service).
    # By default journald is volatile (/run/log/journal, lost on reboot). Make it persistent
    # (/var/log/journal) so Alloy's loki.source.journal can tail it (the /var/log mount already covers
    # /var/log/journal; /run/log/journal is NOT mounted). Run before the role so /var/log/journal is
    # populated before the Alloy DaemonSet starts. Gated on observability_enabled (no Alloy -> no need).
    - name: Create journald drop-in directory
      ansible.builtin.file:
        path: /etc/systemd/journald.conf.d
        state: directory
        mode: "0755"
      become: true
      when: observability_enabled | bool

    - name: Ensure persistent journald config (Alloy tails /var/log/journal)
      ansible.builtin.copy:
        dest: /etc/systemd/journald.conf.d/10-persistent.conf
        content: |
          [Journal]
          Storage=persistent
          SystemMaxUse=500M
        mode: "0644"
      become: true
      register: journald_conf
      when: observability_enabled | bool

    - name: Restart journald + flush runtime -> persistent
      ansible.builtin.shell: systemctl restart systemd-journald && journalctl --flush
      become: true
      changed_when: false
      when:
        - observability_enabled | bool
        - journald_conf.changed | default(false)
  roles:
    - role: xanmanning.k3s

  # Assert CoreDNS replica count (K3s addon no longer sets spec.replicas since v1.25.5).
  post_tasks:
    - name: Wait for CoreDNS Deployment to exist
      ansible.builtin.command:
        argv:
          - /usr/local/bin/k3s
          - kubectl
          - get
          - deploy
          - coredns
          - -n
          - kube-system
      changed_when: false
      register: coredns_exists
      retries: 30
      delay: 3
      until: coredns_exists.rc == 0
      when: inventory_hostname == (groups['k3s_cluster'] | first)

    - name: Read current CoreDNS replica count
      ansible.builtin.command:
        argv:
          - /usr/local/bin/k3s
          - kubectl
          - get
          - deploy
          - coredns
          - -n
          - kube-system
          - -o
          - jsonpath={.spec.replicas}
      changed_when: false
      register: coredns_current_replicas
      when: inventory_hostname == (groups['k3s_cluster'] | first)

    - name: Scale CoreDNS to {{ coredns_replicas }}
      ansible.builtin.command:
        argv:
          - /usr/local/bin/k3s
          - kubectl
          - scale
          - deploy
          - coredns
          - -n
          - kube-system
          - --replicas={{ coredns_replicas }}
      when:
        - inventory_hostname == (groups['k3s_cluster'] | first)
        - (coredns_current_replicas.stdout | int) != (coredns_replicas | int)

    # ------------------------------------------------------------
    # Post-deploy verification (ensure auto-deploy resources actually rolled out)
    # ------------------------------------------------------------
    - name: Verify Traefik DaemonSet is rolled out
      ansible.builtin.command:
        argv:
          - /usr/local/bin/k3s
          - kubectl
          - rollout
          - status
          - daemonset/traefik
          - -n
          - kube-system
          - --timeout=60s
      changed_when: false
      register: verify_traefik
      retries: 20
      delay: 5
      until: verify_traefik.rc == 0
      when: inventory_hostname == (groups['k3s_cluster'] | first)

    - name: Verify MetalLB controller is rolled out
      ansible.builtin.command:
        argv:
          - /usr/local/bin/k3s
          - kubectl
          - rollout
          - status
          - deployment/controller
          - -n
          - metallb-system
          - --timeout=60s
      changed_when: false
      register: verify_metallb
      retries: 20
      delay: 5
      until: verify_metallb.rc == 0
      when: inventory_hostname == (groups['k3s_cluster'] | first)

    - name: Verify ceph-csi-operator is rolled out
      ansible.builtin.command:
        argv:
          - /usr/local/bin/k3s
          - kubectl
          - rollout
          - status
          - deployment/ceph-csi-operator-controller-manager
          - -n
          - ceph-csi-operator-system
          - --timeout=60s
      changed_when: false
      register: verify_ceph_operator
      retries: 20
      delay: 5
      until: verify_ceph_operator.rc == 0
      when: inventory_hostname == (groups['k3s_cluster'] | first)

    - name: Verify CSI snapshot-controller is rolled out
      ansible.builtin.command:
        argv:
          - /usr/local/bin/k3s
          - kubectl
          - rollout
          - status
          - deployment/snapshot-controller
          - -n
          - kube-system
          - --timeout=60s
      changed_when: false
      register: verify_snapshot_controller
      retries: 20
      delay: 5
      until: verify_snapshot_controller.rc == 0
      when: inventory_hostname == (groups['k3s_cluster'] | first)

    - name: Verify cert-manager deployments are available
      ansible.builtin.command:
        argv:
          - /usr/local/bin/k3s
          - kubectl
          - wait
          - --for=condition=Available
          - deployment
          - -n
          - cert-manager
          - --all
          - --timeout=120s
      changed_when: false
      register: verify_certmanager
      retries: 20
      delay: 5
      until: verify_certmanager.rc == 0
      when:
        - inventory_hostname == (groups['k3s_cluster'] | first)
        - certmanager_enabled | bool

    - name: Verify NFS CSI controller is rolled out
      ansible.builtin.command:
        argv:
          - /usr/local/bin/k3s
          - kubectl
          - rollout
          - status
          - deployment/csi-nfs-controller
          - -n
          - kube-system
          - --timeout=60s
      changed_when: false
      register: verify_nfs
      retries: 20
      delay: 5
      until: verify_nfs.rc == 0
      when:
        - inventory_hostname == (groups['k3s_cluster'] | first)
        - nfs_enabled | bool

    - name: Verify SMB CSI controller is rolled out
      ansible.builtin.command:
        argv:
          - /usr/local/bin/k3s
          - kubectl
          - rollout
          - status
          - deployment/csi-smb-controller
          - -n
          - kube-system
          - --timeout=60s
      changed_when: false
      register: verify_smb
      retries: 20
      delay: 5
      until: verify_smb.rc == 0
      when:
        - inventory_hostname == (groups['k3s_cluster'] | first)
        - smb_enabled | bool

    # ------------------------------------------------------------
    # Observability verification
    # ------------------------------------------------------------
    - name: Verify Prometheus is rolled out
      ansible.builtin.command:
        argv:
          - /usr/local/bin/k3s
          - kubectl
          - rollout
          - status
          - statefulset/prometheus-kube-prometheus-stack-prometheus
          - -n
          - monitoring
          - --timeout=60s
      changed_when: false
      register: verify_prometheus
      retries: 20
      delay: 5
      until: verify_prometheus.rc == 0
      when:
        - inventory_hostname == (groups['k3s_cluster'] | first)
        - observability_enabled | bool

    - name: Verify Grafana is rolled out
      ansible.builtin.command:
        argv:
          - /usr/local/bin/k3s
          - kubectl
          - rollout
          - status
          - deployment/kube-prometheus-stack-grafana
          - -n
          - monitoring
          - --timeout=60s
      changed_when: false
      register: verify_grafana
      retries: 20
      delay: 5
      until: verify_grafana.rc == 0
      when:
        - inventory_hostname == (groups['k3s_cluster'] | first)
        - observability_enabled | bool

    - name: Verify Alertmanager is rolled out
      ansible.builtin.command:
        argv:
          - /usr/local/bin/k3s
          - kubectl
          - rollout
          - status
          - statefulset/alertmanager-kube-prometheus-stack-alertmanager
          - -n
          - monitoring
          - --timeout=60s
      changed_when: false
      register: verify_alertmanager
      retries: 20
      delay: 5
      until: verify_alertmanager.rc == 0
      when:
        - inventory_hostname == (groups['k3s_cluster'] | first)
        - observability_enabled | bool

    - name: Verify kube-state-metrics is rolled out
      ansible.builtin.command:
        argv:
          - /usr/local/bin/k3s
          - kubectl
          - rollout
          - status
          - deployment/kube-prometheus-stack-kube-state-metrics
          - -n
          - monitoring
          - --timeout=60s
      changed_when: false
      register: verify_kube_state_metrics
      retries: 20
      delay: 5
      until: verify_kube_state_metrics.rc == 0
      when:
        - inventory_hostname == (groups['k3s_cluster'] | first)
        - observability_enabled | bool

    - name: Verify node-exporter DaemonSet is rolled out
      ansible.builtin.command:
        argv:
          - /usr/local/bin/k3s
          - kubectl
          - rollout
          - status
          - daemonset/prometheus-node-exporter
          - -n
          - observability-host
          - --timeout=60s
      changed_when: false
      register: verify_node_exporter
      retries: 20
      delay: 5
      until: verify_node_exporter.rc == 0
      when:
        - inventory_hostname == (groups['k3s_cluster'] | first)
        - observability_enabled | bool

    - name: Verify Loki is rolled out
      ansible.builtin.command:
        argv:
          - /usr/local/bin/k3s
          - kubectl
          - rollout
          - status
          - statefulset/loki
          - -n
          - monitoring
          - --timeout=60s
      changed_when: false
      register: verify_loki
      retries: 20
      delay: 5
      until: verify_loki.rc == 0
      when:
        - inventory_hostname == (groups['k3s_cluster'] | first)
        - observability_enabled | bool

    - name: Verify Alloy DaemonSet is rolled out
      ansible.builtin.command:
        argv:
          - /usr/local/bin/k3s
          - kubectl
          - rollout
          - status
          - daemonset/alloy
          - -n
          - observability-host
          - --timeout=60s
      changed_when: false
      register: verify_alloy
      retries: 20
      delay: 5
      until: verify_alloy.rc == 0
      when:
        - inventory_hostname == (groups['k3s_cluster'] | first)
        - observability_enabled | bool

    - name: Verify volume snapshot CronJobs exist
      ansible.builtin.command:
        argv:
          - /usr/local/bin/k3s
          - kubectl
          - get
          - cronjob
          - "{{ item.name }}-snapshotter"
          - -n
          - "{{ item.namespace }}"
      changed_when: false
      register: verify_volume_snapshots
      loop: "{{ volume_snapshots | default([]) }}"
      retries: 20
      delay: 5
      until: verify_volume_snapshots.rc == 0
      when:
        - inventory_hostname == (groups['k3s_cluster'] | first)
        - (volume_snapshots | default([]) | length > 0)

    # ------------------------------------------------------------
    # Kubeconfig for ansible_user
    # ------------------------------------------------------------
    - name: Check if k3s kubeconfig exists on node
      ansible.builtin.stat:
        path: /etc/rancher/k3s/k3s.yaml
      register: k3s_kubeconfig

    - name: Create .kube directory for ansible_user
      ansible.builtin.file:
        path: "~{{ ansible_user }}/.kube"
        state: directory
        owner: "{{ ansible_user }}"
        group: "{{ ansible_user }}"
        mode: '0750'
      when: k3s_kubeconfig.stat.exists

    - name: Copy k3s kubeconfig to ansible_user profile
      ansible.builtin.copy:
        src: /etc/rancher/k3s/k3s.yaml
        dest: "~{{ ansible_user }}/.kube/config"
        remote_src: yes
        owner: "{{ ansible_user }}"
        group: "{{ ansible_user }}"
        mode: '0600'
      when: k3s_kubeconfig.stat.exists
